<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${status} + ' | Error'">Error</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .card {
            width: 90%;
            max-width: 550px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(60px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .icon {
            width: 130px;
            margin: 0 auto 20px;
            animation: pop 0.8s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .code {
            font-size: 70px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .message {
            font-size: 22px;
            margin-bottom: 6px;
        }

        .details {
            font-size: 14px;
            opacity: 0.9;
        }

        a {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background: #fff;
            color: #2575fc;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        a:hover {
            transform: translateY(-3px);
            background: #f1f1f1;
        }
    </style>
</head>

<body>

<div class="card">

    <!-- Dynamic Icon -->
    <img th:src="@{'/icons/' + ${icon}}" class="icon" alt="Error Icon">

    <div class="code" th:text="${status}">404</div>

    <div class="message" th:text="${error}">Page Not Found</div>

    <div class="details" th:text="${message}">
        The page you are looking for does not exist.
    </div>

    <a th:href="@{/}">Back to Home</a>
</div>

</body>
</html>
