<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MahaIT Recruitment Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            min-height: 100vh;
        }
        .hero {
            margin-top: 10%;
        }
        .portal-card {
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="container hero text-center">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow portal-card p-4">
                <h1 class="mb-3">Welcome to MahaIT Recruitment Portal</h1>
                <p class="text-muted">
                    A centralized platform for Recruitment, Attendance, Invoice & HR Management  
                    for Government Departments and Empaneled Agencies.
                </p>

                <div class="d-flex justify-content-center gap-3 mt-4">
                    <a href="/login" class="btn btn-primary px-4">Login</a>
                    <a href="/about" class="btn btn-outline-secondary px-4">About Portal</a>
                </div>

                <hr>

                <small class="text-muted">
                    Government of Maharashtra | MahaIT  
                </small>
            </div>
        </div>
    </div>
</div>

</body>
</html>
