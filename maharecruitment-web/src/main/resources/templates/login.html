<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Custom Styles -->
    <style>
        body {
            background: linear-gradient(135deg, #003b7a, #007bff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .login-wrapper {
            width: 100%;
            max-width: 430px;
        }

        .login-card {
            background: #ffffff;
            padding: 2.8rem 2.2rem;
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
			animation: none !important;

        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(25px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-title {
            font-weight: 600;
            font-size: 27px;
            color: #003b7a;
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .form-label {
            font-weight: 600;
            color: #003b7a;
        }

        .form-control-lg {
            border-radius: 10px;
            padding: 12px;
        }

        .btn-login {
            background: #003b7a;
            border: none;
            padding: 12px;
            font-size: 17px;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .btn-login:hover {
            background: #002d5c;
            transform: translateY(-2px);
        }

        .footer-links a {
            font-size: 14px;
            color: #003b7a;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>

<div class="login-wrapper">
    <div class="login-card">

        <!-- Title -->
        <div class="login-title">
            <i class="fa-solid fa-user-lock"></i> HRMS Login
        </div>

        <!-- Login Error -->
        <div th:if="${param.error}" class="alert alert-danger py-2">
            Invalid username, password, or captcha.
        </div>

        <!-- Logout Message -->
        <div th:if="${param.logout}" class="alert alert-success py-2">
            You have been logged out successfully.
        </div>

		<div th:if="${param.captchaError}" class="alert alert-danger">
		    Please verify the Captcha.
		</div>

		
        <!-- Login Form -->
			<form th:action="@{/doLogin}" method="post">


            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text"
                       class="form-control form-control-lg"
                       name="username"
                       placeholder="Enter username"
                       required autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password"
                       class="form-control form-control-lg"
                       name="password"
                       placeholder="Enter password"
                       required>
            </div>

            <!-- Hidden Continue Parameter -->
            <input type="hidden" name="continue" th:value="${param.continue}" />

            <!-- 🟦 Google reCAPTCHA -->
            <div class="mb-3 text-center">
                <div class="g-recaptcha"
                     th:attr="data-sitekey=${@environment.getProperty('google.recaptcha.site.key')}">
                </div>
            </div>

            <!-- Submit Button -->
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-login text-white">
                    <i class="fa-solid fa-right-to-bracket"></i> Login
                </button>
            </div>

        </form>

        <!-- Footer links -->
        <div class="mt-3 text-center footer-links">
            <a href="#"><i class="fa-solid fa-unlock-keyhole"></i> Forgot Password?</a>
        </div>

    </div>
</div>

<!-- Load Google reCAPTCHA -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

</body>
</html>
